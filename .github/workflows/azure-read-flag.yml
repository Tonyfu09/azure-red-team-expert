name: Read Azure Storage Flag

on:
  push:
    branches: [ main ]

jobs:
  read-flag:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: List containers
        run: |
          az storage container list \
            --account-name iamazurelab3be53eb51 \
            --auth-mode login

      - name: Download flag as 2.3-flag.txt
        run: |
          az storage blob download \
            --account-name iamazurelab3be53eb51 \
            --container-name flag_container_3 \
            --name flag.txt \
            --file 2.3-flag.txt \
            --auth-mode login

      - name: Output 2.3-flag.txt
        run: |
          cat 2.3-flag.txt

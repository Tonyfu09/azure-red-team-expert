name: Read Azure Storage Flag ✅ FIXED
on:
  push:
    branches: [ main ]

jobs:
  read-flag:
    runs-on: ubuntu-latest
    environment: AZURE_CLIENT_ID  # ← 你嘅 environment 名
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🔐 Azure Login (Managed Identity OIDC)
        run: |
          echo "CLIENT_ID: ${AZURE_CLIENT_ID:0:8}..."
          echo "TENANT_ID: ${AZURE_TENANT_ID:0:8}..."
          
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r ".value")
          
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --federated-token "$ID_TOKEN" \
            --tenant "$AZURE_TENANT_ID" \
            --verbose
          
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          az account show

      - name: 🎉 Get Flag
        run: |
          az storage blob download \
            --account-name iamazurelab3be53eb51 \
            --container-name flag_container_3 \
            --name flag.txt \
            --file flag.txt \
            --auth-mode login
          cat flag.txt

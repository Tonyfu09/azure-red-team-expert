name: Read Azure Storage Flag

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  read-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token & Login
        run: |
          # 1. Request GitHub OIDC token
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r ".value")
          
          # 2. Login to Azure with OIDC token
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-token "$ID_TOKEN" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          
          # 3. Set subscription
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: List containers
        run: |
          az storage container list \
            --account-name iamazurelab3be53eb51 \
            --auth-mode login

      - name: Download flag as 2.3-flag.txt
        run: |
          az storage blob download \
            --account-name iamazurelab3be53eb51 \
            --container-name flag_container_3 \
            --name flag.txt \
            --file 2.3-flag.txt \
            --auth-mode login

      - name: Output 2.2-flag.txt
        run: |
          cat 2.2-flag.txt

name: Read Azure Storage Flag ✅ FIXED STORAGE
on:
  push:
    branches: [ main ]

jobs:
  read-flag:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 🔐 Azure Login (WORKING!)
        env:
          AZURE_CLIENT_ID: 697548d1-9ef2-4c14-a6e0-d6aadc9ea32a
          AZURE_TENANT_ID: fdd066e1-ee37-49bc-b08f-d0e152119b04
          AZURE_SUBSCRIPTION_ID: d4b3033a-d7c4-4d36-977e-33a54ba013e5
        run: |
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r ".value")
          
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --federated-token "$ID_TOKEN" \
            --tenant "$AZURE_TENANT_ID"
          
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: 🔍 1. 先 List 所有 containers（確認名正確）
        run: |
          az storage container list \
            --account-name "iamazurelab3be53eb51" \
            --auth-mode login \
            --output table

      - name: 🔍 2. List flag_container_3 內所有 blobs
        run: |
          az storage blob list \
            --account-name "iamazurelab3be53eb51" \
            --container-name "flag_container_3" \
            --auth-mode login \
            --output table

      - name: 📥 3. Download flag.txt（加引號防空格）
        run: |
          az storage blob download \
            --account-name "iamazurelab3be53eb51" \
            --container-name "flag_container_3" \
            --name "flag.txt" \
            --file "flag.txt" \
            --auth-mode login \
            --output none
          
          echo "🎉 FLAG CONTENT:"
          cat flag.txt

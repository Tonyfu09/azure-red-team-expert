name: Read Azure Storage Flag ✅ FINAL
on:
  push:
    branches: [ main ]

jobs:
  read-flag:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Flag 🎉
        run: |
          az storage blob download \
            --account-name iamazurelab3be53eb51 \
            --container-name flag_container_3 \
            --name flag.txt \
            --file flag.txt \
            --auth-mode login
          echo "=== FLAG ==="
          cat flag.txt
